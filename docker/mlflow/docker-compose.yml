version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mlflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD:-MLflowPass123}
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlflow_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_URI: postgresql://mlflow:${MLFLOW_DB_PASSWORD:-MLflowPass123}@postgres:5432/mlflow
      MLFLOW_ARTIFACT_ROOT: s3://${MLFLOW_S3_BUCKET:-ecommerce-mlops-mlflow-artifacts}/mlruns
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: us-east-1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:${MLFLOW_DB_PASSWORD:-MLflowPass123}@postgres:5432/mlflow
      --default-artifact-root s3://${MLFLOW_S3_BUCKET:-ecommerce-mlops-mlflow-artifacts}/mlruns
      --serve-artifacts

volumes:
  postgres_data:
