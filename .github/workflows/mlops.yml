name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ecommerce-mlops-api
  EKS_CLUSTER: ecommerce-mlops-cluster
  K8S_NAMESPACE: recommendation
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Stage 1: Unit Tests ───────────────────────────────────────────────────
  test:
    name: 🧪 Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short

  # ─── Stage 2: Data Validation ─────────────────────────────────────────────
  data-validation:
    name: 📊 Data Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data validation
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python src/data_validation.py

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: artifacts/validation_report.json

  # ─── Stage 3: Train Model ─────────────────────────────────────────────────
  train:
    name: 🤖 Train Model
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python pipelines/training_pipeline.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: |
            artifacts/model.pkl
            artifacts/evaluation_report.json

  # ─── Stage 4: Evaluate Model ──────────────────────────────────────────────
  evaluate:
    name: 📈 Evaluate & Gate Model
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-artifact
          path: artifacts/

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate evaluation metrics
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          import json, sys
          with open('artifacts/evaluation_report.json') as f:
              m = json.load(f)
          print('Metrics:', json.dumps(m, indent=2))
          # Gate: fail CI if recall_at_k < 0.03
          if m.get('recall_at_k', 0) < 0.03:
              print('Model quality gate FAILED')
              sys.exit(1)
          print('Model quality gate PASSED')
          "

  # ─── Stage 5: Security Scanning ───────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: evaluate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan on Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

  # ─── Stage 6: Build Docker Image ──────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: evaluate
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_uri: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-artifact
          path: artifacts/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ─── Stage 7: Update Kubernetes Manifests ─────────────────────────────────
  update-manifests:
    name: 📝 Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Update image tag in deployment.yaml
        env:
          ECR_URI: ${{ needs.build.outputs.ecr_uri }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          sed -i "s|image: .*ecommerce-mlops-api.*|image: $ECR_URI:$IMAGE_TAG|g" \
              k8s/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update image tag to ${{ needs.build.outputs.image_tag }}"
          git push

  # ─── Stage 8: Deploy to EKS ───────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build, update-manifests]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} \
              --region ${{ env.AWS_REGION }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/recommendation-api \
              -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          kubectl get svc  -n ${{ env.K8S_NAMESPACE }}

  # ─── Stage 9: Post-Deploy Health Check ────────────────────────────────────
  health-check:
    name: ✅ Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check pod health
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} \
              --region ${{ env.AWS_REGION }}
          kubectl get pods -n recommendation -l app=recommendation-api
          RUNNING=$(kubectl get pods -n recommendation \
              -l app=recommendation-api \
              --field-selector=status.phase=Running --no-headers | wc -l)
          echo "Running pods: $RUNNING"
          if [ "$RUNNING" -lt 2 ]; then
            echo "Health check failed: insufficient running pods"
            exit 1
          fi
          echo "Health check passed ✅"
