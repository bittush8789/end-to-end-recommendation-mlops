name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ecommerce-mlops-api
  EKS_CLUSTER: ecommerce-mlops-cluster
  K8S_NAMESPACE: recommendation
  PYTHON_VERSION: "3.11"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1 — Unit Tests
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: "🧪 Stage 1 · Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v --tb=short

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2 — Data Validation
  # ═══════════════════════════════════════════════════════════════════════════
  data-validation:
    name: "📊 Stage 2 · Data Validation"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data validation
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python src/data_validation.py

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-report
          path: artifacts/validation_report.json
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 3 — Model Training
  # ═══════════════════════════════════════════════════════════════════════════
  train:
    name: "🤖 Stage 3 · Train Model"
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python pipelines/training_pipeline.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: |
            artifacts/model.pkl
            artifacts/evaluation_report.json
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 4 — Evaluate & Quality Gate
  # ═══════════════════════════════════════════════════════════════════════════
  evaluate:
    name: "📈 Stage 4 · Evaluate & Gate"
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-artifact
          path: artifacts/

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model monitoring / drift check
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python src/model_monitoring.py
        continue-on-error: true

      - name: Validate evaluation metrics (quality gate)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          import json, sys
          with open('artifacts/evaluation_report.json') as f:
              m = json.load(f)
          print('=== Evaluation Metrics ===')
          for k, v in m.items():
              print(f'  {k}: {v}')
          recall = m.get('recall_at_k', 0)
          if recall < 0.03:
              print(f'Quality gate FAILED: recall_at_k={recall} < 0.03')
              sys.exit(1)
          print(f'Quality gate PASSED: recall_at_k={recall}')
          "

      - name: Upload monitoring reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monitoring-reports
          path: artifacts/monitoring/
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 5 — Security Scan (Trivy)
  # ═══════════════════════════════════════════════════════════════════════════
  security-scan:
    name: "🔒 Stage 5 · Security Scan"
    runs-on: ubuntu-latest
    needs: evaluate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0          # warn-only, do not block pipeline
          severity: HIGH,CRITICAL

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 6 — Build Docker Image → Push to ECR
  # Requires: AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY secrets
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: "🐳 Stage 6 · Build & Push ECR"
    runs-on: ubuntu-latest
    needs: evaluate
    if: |
      github.ref == 'refs/heads/main' &&
      secrets.AWS_ACCESS_KEY_ID != ''
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_uri: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-artifact
          path: artifacts/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "✅ Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 7 — Update K8s Deployment Manifest with new image tag
  # ═══════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Stage 7 · Update K8s Manifests"
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch image in deployment.yaml
        env:
          ECR_URI: ${{ needs.build.outputs.ecr_uri }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          sed -i "s|image: .*ecommerce-mlops-api.*|image: ${ECR_URI}:${IMAGE_TAG}|g" \
              k8s/deployment.yaml
          echo "Updated deployment.yaml → ${ECR_URI}:${IMAGE_TAG}"

      - name: Commit & push manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet && echo "No changes to commit" || \
            ( git commit -m "ci(k8s): update image → ${{ needs.build.outputs.image_tag }}" && git push )

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 8 — Deploy to EKS
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: "🚀 Stage 8 · Deploy to EKS"
    runs-on: ubuntu-latest
    needs: [build, update-manifests]
    if: |
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Apply all K8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/recommendation-api \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Show deployment status
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          echo "=== Services ==="
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}
          echo "=== HPA ==="
          kubectl get hpa -n ${{ env.K8S_NAMESPACE }}

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 9 — Post-Deploy Health Check
  # ═══════════════════════════════════════════════════════════════════════════
  health-check:
    name: "✅ Stage 9 · Health Check"
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      github.ref == 'refs/heads/main' &&
      needs.deploy.result == 'success'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify running pod count
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

          kubectl get pods -n recommendation -l app=recommendation-api

          RUNNING=$(kubectl get pods -n recommendation \
            -l app=recommendation-api \
            --field-selector=status.phase=Running \
            --no-headers | wc -l)

          echo "Running pods: $RUNNING"

          if [ "$RUNNING" -lt 2 ]; then
            echo "❌ Health check FAILED — expected ≥2 running pods, got $RUNNING"
            exit 1
          fi
          echo "✅ Health check PASSED — $RUNNING pods running"
