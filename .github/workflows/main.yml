name: E-Commerce Recommendation CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ecommerce-mlops-api
  K8S_NAMESPACE: recommendation
  IMAGE_TAG: ${{ github.sha }}
  EKS_CLUSTER: ecommerce-mlops-cluster

jobs:
  build-and-deploy:
    name: "🛠️ Build, Test & Deploy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v

      - name: Run Training Pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python pipelines/training_pipeline.py

      # ---- Docker build & push ----
      - name: Configure AWS credentials
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} ${{ env.ECR_REPOSITORY }}:latest

      - name: Push Docker image to ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          docker push ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REPOSITORY }}:latest

      # ---- Kubernetes deployment ----
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Update kubeconfig for EKS
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Deploy FastAPI service & resources
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/

      - name: Deploy KServe InferenceService
        run: |
          kubectl apply -f kserve/inferenceservice.yaml

      - name: Deploy ArgoCD
        run: |
          kubectl apply -f argocd/install.yaml

      - name: Verify FastAPI rollout
        run: |
          kubectl rollout status deployment/recommendation-api -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Verify KServe readiness
        run: |
          kubectl wait --for=condition=Ready inferenceservice/recommendation-model -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Post‑deployment health check
        run: |
          curl -sSf http://$(kubectl get svc recommendation-api-svc -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.clusterIP}'):80/health
          curl -sSf http://$(kubectl get svc recommendation-model-predictor-default -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.url}')/v1/models/recommendation:predict -d '{"instances": [1,2,3]}'
